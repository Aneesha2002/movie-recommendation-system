<!-- signup.html -->
<div class="signup-container">
  <h2>Sign Up</h2>
  <form (ngSubmit)="onSignup()" #signupForm="ngForm">
    <label>Username:</label>
    <input type="text" [(ngModel)]="signupData.username" name="username" required />

    <label>Password:</label>
    <input type="password" [(ngModel)]="signupData.password" name="password" required />

    <label>Confirm Password:</label>
    <input type="password" [(ngModel)]="signupData.password2" name="password2" required />

    <button type="submit" [disabled]="!signupForm.form.valid">Sign Up</button>
  </form>

  <p class="message">{{ message }}</p>
</div>
